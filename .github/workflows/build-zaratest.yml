name: Build ZaraTest APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Instalar SDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -2

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🔨 Gerar gradlew
        run: |
          cd price-tracker-test/android/ZaraTest
          gradle wrapper --gradle-version 9.5.0 2>&1 | tail -3

      - name: 🏗️ Build APK
        run: |
          cd price-tracker-test/android/ZaraTest
          ./gradlew assembleDebug 2>&1

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZaraTest-APK
          path: price-tracker-test/android/ZaraTest/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error